<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #070A0F; color: white; font-family: sans-serif; display: flex; flex-direction: column; gap: 20px; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .card { border: 1px solid #333; padding: 10px; text-align: center; }
    img { width: 100%; height: auto; }
  </style>
</head>
<body>
  <h1>Chevrolet Banners Preview</h1>
  <div class="grid">
    <div class="card">
      <h3>Banner Automotivo Premium Chevrolet SP.png</h3>
      <img src="./Banner Automotivo Premium Chevrolet SP.png" />
    </div>
    <div class="card">
      <h3>Banner Automotivo Premium Chevrolet SP (1).png</h3>
      <img src="./Banner Automotivo Premium Chevrolet SP (1).png" />
    </div>
    <div class="card">
      <h3>Banner Automotivo Premium Chevrolet SP (2).png</h3>
      <img src="./Banner Automotivo Premium Chevrolet SP (2).png" />
    </div>
    <div class="card">
      <h3>Banner Automotivo Premium Chevrolet SP (3).png</h3>
      <img src="./Banner Automotivo Premium Chevrolet SP (3).png" />
    </div>
    <div class="card">
      <h3>Banner Automotivo Premium Chevrolet SP (5).png</h3>
      <img src="./Banner Automotivo Premium Chevrolet SP (5).png" />
    </div>
  </div>
</body>
</html>
